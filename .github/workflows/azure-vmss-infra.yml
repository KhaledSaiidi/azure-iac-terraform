name: Azure VMSS Infrastructure Deployment
on:
  push:
    branches:
      - main
    paths:
      - azure-vmss-infra/assets/index.php
  workflow_dispatch:
    inputs:
      tf_action:
        description: "Terraform action to perform"
        required: false
        type: choice
        default: none
        options:
          - none
          - deploy
          - destroy
defaults:
  run:
    working-directory: azure-vmss-infra

jobs:
  manage-infrastructure:
    runs-on: ubuntu-latest
    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
      TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
      TF_ACTION: ${{ inputs.tf_action || 'none' }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        id: checkout

      - name: "🚀 Starting VMSS infra workflow"
        run: |
          echo "🚀 Azure VMSS infra workflow started"
          echo "🧭 Runner: ${RUNNER_NAME} (${RUNNER_OS})"

      - name: "📦 Checkout result"
        if: ${{ always() }}
        run: |
          if [ "${{ steps.checkout.outcome }}" = "success" ]; then
            echo "✅ Checkout completed"
          else
            echo "❌ Checkout failed (outcome: ${{ steps.checkout.outcome }})"
            exit 1
          fi

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        id: setup_terraform
        with:
          terraform_version: '1.14.7'

      - name: "🧰 Terraform setup result"
        if: ${{ always() }}
        run: |
          if [ "${{ steps.setup_terraform.outcome }}" = "success" ]; then
            echo "✅ Terraform setup completed"
          else
            echo "❌ Terraform setup failed (outcome: ${{ steps.setup_terraform.outcome }})"
            exit 1
          fi

      - name: Validate Azure Credentials
        id: validate_creds
        run: |
          missing=()
          for v in ARM_CLIENT_ID ARM_CLIENT_SECRET ARM_SUBSCRIPTION_ID ARM_TENANT_ID GH_TOKEN TF_VAR_ssh_public_key; do
            if [ -z "${!v:-}" ]; then
              missing+=("$v")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "Missing required secrets: ${missing[*]}"
            exit 1
          fi
          echo "All required secrets are present."

      - name: "🔐 Credentials validation result"
        if: ${{ always() }}
        run: |
          if [ "${{ steps.validate_creds.outcome }}" = "success" ]; then
            echo "✅ Credentials validation completed"
          else
            echo "❌ Credentials validation failed (outcome: ${{ steps.validate_creds.outcome }})"
            exit 1
          fi

      - name: "🧭📐 Plan Infrastructure Changes"
        if: ${{ steps.validate_creds.outcome == 'success' }}
        id: plan
        run: |
          echo "🧰 Running terraform init"
          terraform init -input=false
          echo "🧮 Running terraform plan"
          terraform plan -input=false -out=plan.out
          echo "🧾 Plan summary"
          plan_line="$(terraform show -no-color plan.out | grep -E "^Plan: " || true)"
          if [ -n "${plan_line}" ]; then
            echo "${plan_line}"
          else
            echo "🟢 No changes. Your infrastructure matches the configuration."
          fi
          echo ""
          echo "📋 Planned resource changes"
          changes="$(terraform show -no-color plan.out | \
            awk '
              /^  # / && /will be created/ {print "  ➕ " $0; next}
              /^  # / && /will be updated/ {print "  🔧 " $0; next}
              /^  # / && /will be destroyed/ {print "  🗑️  " $0; next}
            ' | sed -E "s/^  (➕|🔧|🗑️  )  # /  \\1 /")"
          if [ -n "${changes}" ]; then
            echo "${changes}"
          else
            echo "🟢 No resource changes to display."
          fi

      - name: "📊 Infrastructure Plan result"
        if: ${{ always() }}
        run: |
          if [ "${{ steps.plan.outcome }}" = "success" ]; then
            echo "✅ Terraform plan completed"
          elif [ "${{ steps.plan.outcome }}" = "skipped" ]; then
            echo "⚠️ Terraform plan skipped"
          else
            echo "❌ Terraform plan failed (outcome: ${{ steps.plan.outcome }})"
            exit 1
          fi

      - name: "🧭 TF_ACTION Selector"
        if: ${{ always() }}
        run: |
          if [ -z "${TF_ACTION:-}" ]; then
            echo "⚠️ TF_ACTION is not set (expected: deploy|destroy)."
          else
            echo "🧭 TF_ACTION=${TF_ACTION}"
          fi

      - name: "🚀📦 Deploy Infrastructure"
        if: ${{ steps.plan.outcome == 'success' && env.TF_ACTION == 'deploy' }}
        id: deploy
        run: |
          echo "🚀 Applying Terraform plan"
          terraform apply -input=false -auto-approve plan.out
          echo "✅ Terraform apply completed"

      - name: "📊 Infrastructure Deploy result"
        if: ${{ always() }}
        run: |
          if [ "${{ steps.deploy.outcome }}" = "success" ]; then
            echo "✅ Terraform deploy completed"
          elif [ "${{ steps.deploy.outcome }}" = "skipped" ]; then
            echo "⚠️ Terraform deploy skipped"
          else
            echo "❌ Terraform deploy failed (outcome: ${{ steps.deploy.outcome }})"
            exit 1
          fi

      - name: "🧨🗑️ Destroy Infrastructure"
        if: ${{ env.TF_ACTION == 'destroy' }}
        id: destroy
        run: |
          echo "🧨 Destroying Terraform-managed resources"
          terraform destroy -input=false -auto-approve
          echo "✅ Terraform destroy completed"

      - name: "📊 Infrastructure Destroy result"
        if: ${{ always() }}
        run: |
          if [ "${{ steps.destroy.outcome }}" = "success" ]; then
            echo "✅ Terraform destroy completed"
          elif [ "${{ steps.destroy.outcome }}" = "skipped" ]; then
            echo "⚠️ Terraform destroy skipped"
          else
            echo "❌ Terraform destroy failed (outcome: ${{ steps.destroy.outcome }})"
            exit 1
          fi
